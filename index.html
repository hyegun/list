<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Data Peserta</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="modal fade" id="editModal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5>Edit Peserta</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="rowIndex" />

            <div class="mb-3">
              <label for="nama" class="form-label fw-bold">
                Nama Peserta
              </label>
              <input type="text" class="form-control" id="nama" />
            </div>

            <div class="mb-3">
              <label for="jk" class="form-label fw-bold"> Jenis Kelamin </label>
              <select class="form-select" id="jk">
                <option value="Laki laki">Laki laki</option>
                <option value="Perempuan">Perempuan</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="ktp" class="form-label fw-bold"> Nomor KTP </label>
              <input type="text" class="form-control" id="ktp" />
            </div>

            <div class="mb-3">
              <label for="tglLahir" class="form-label fw-bold">
                Tanggal Lahir
              </label>
              <input type="date" class="form-control" id="tglLahir" />
            </div>

            <div class="mb-3">
              <label for="usia" class="form-label fw-bold"> Usia </label>
              <input type="number" class="form-control" id="usia" />
            </div>

            <div class="mb-3">
              <label for="telp" class="form-label fw-bold">
                Nomor Telepon
              </label>
              <input type="text" class="form-control" id="telp" />
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-primary" onclick="simpanEdit()">
              Simpan
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="container py-4">
      <h2>Dashboard Data Peserta</h2>
      <table id="tbl" class="table table-striped table-bordered w-100">
        <thead>
          <tr>
            <th>No</th>
            <th>Nama</th>
            <th>JK</th>
            <th>No KTP</th>
            <th>Tgl Lahir</th>
            <th>Usia</th>
            <th>Telp</th>
            <th>Tgl Daftar</th>
            <th>Hadir</th>
            <th>Antri</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const API =
        "https://script.google.com/macros/s/AKfycbzm3qSu7-9n4Rlm96yFGA0vc6bVK5Wj9NK310cpkPH40jczqLxWpoKbbGDZH5SoJSQd/exec";
      async function loadData() {
        const res = await fetch(API + "?action=listPeserta");
        const j = await res.json();
        const tbody = document.querySelector("#tbl tbody");
        tbody.innerHTML = "";
        (j.data || []).forEach((r) => {
          tbody.innerHTML += `<tr>
<td>${r.noUrut}</td><td>${r.nama}</td><td>${r.jenisKelamin}</td>
<td>${r.noKTP}</td><td>${r.tglLahir}</td><td>${r.usia}</td>
<td>${r.noTelp}</td><td>${r.tglDaftar}</td>
<td>${r.statusHadir || ""}</td><td>${r.noAntri || ""}</td>
<td>${r.statusAntri || ""}</td>

<td>
<button
class="btn btn-warning btn-sm"
onclick='editPeserta(${JSON.stringify(r)})'>
Edit
</button>

<button
class="btn btn-danger btn-sm"
onclick="hapusPeserta(${r.rowIndex})">
Hapus
</button>
</td>
</tr>`;
        });
        new DataTable("#tbl", {
          pageLength: 10,
          lengthMenu: [10, 25, 50, 100],
        });
      }
      loadData();

      let modal;

      function editPeserta(data) {
        rowIndex.value = data.rowIndex;

        nama.value = data.nama;

        jk.value = data.jenisKelamin;

        ktp.value = data.noKTP;

        tglLahir.value = data.tglLahir;

        usia.value = data.usia;

        telp.value = data.noTelp;

        modal = new bootstrap.Modal(editModal);

        modal.show();
      }

      async function simpanEdit() {
        const body = {
          rowIndex: rowIndex.value,

          nama: nama.value,

          jenisKelamin: jk.value,

          noKTP: ktp.value,

          tglLahir: tglLahir.value,

          usia: usia.value,

          noTelp: telp.value,
        };

        const res = await fetch(API + "?action=updatePeserta", {
          method: "POST",

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify(body),
        });

        const json = await res.json();

        alert(json.pesan);

        modal.hide();

        loadData();
      }

      async function hapusPeserta(row) {
        if (!confirm("Yakin ingin menghapus?")) return;

        const res = await fetch(API + "?action=hapusPeserta&rowIndex=" + row);

        const json = await res.json();

        alert(json.pesan);

        loadData();
      }
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
  </body>
</html>
