<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Data Peserta</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <h2>Dashboard Data Peserta</h2>
      <table id="tbl" class="table table-striped table-bordered w-100">
        <thead>
          <tr>
            <th>No</th>
            <th>Nama</th>
            <th>JK</th>
            <th>No KTP</th>
            <th>Tgl Lahir</th>
            <th>Usia</th>
            <th>Telp</th>
            <th>Tgl Daftar</th>
            <th>Hadir</th>
            <th>Antri</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const API =
        "https://script.google.com/macros/s/AKfycbylOYVEZRwqeOWQcDKPjeFgIHDB6Twt4iu-RBugr2BW9frFONyY6n2ij5VqDt3QVb-1/exec";
      async function loadData() {
        const res = await fetch(API + "?action=listPeserta");
        const j = await res.json();
        const tbody = document.querySelector("#tbl tbody");
        tbody.innerHTML = "";
        (j.data || []).forEach((r) => {
          tbody.innerHTML += `<tr>
<td>${r.noUrut}</td><td>${r.nama}</td><td>${r.jenisKelamin}</td>
<td>${r.noKTP}</td><td>${r.tglLahir}</td><td>${r.usia}</td>
<td>${r.noTelp}</td><td>${r.tglDaftar}</td>
<td>${r.statusHadir || ""}</td><td>${r.noAntri || ""}</td>
<td>${r.statusAntri || ""}</td>

<td>
<button
class="btn btn-danger btn-sm"
onclick="hapusPeserta('${r.noKTP}')">
Hapus
</button>
</td>
</tr>`;
        });
        new DataTable("#tbl", {
          pageLength: 10,
          lengthMenu: [10, 25, 50, 100],
        });
      }
      loadData();
      async function hapusPeserta(noKTP) {
        if (!confirm("Yakin ingin menghapus data ini?")) {
          return;
        }

        const res = await fetch(
          API + "?action=hapusPeserta&noKTP=" + encodeURIComponent(noKTP),
        );

        const json = await res.json();

        alert(json.pesan);

        loadData();
      }
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
  </body>
</html>
